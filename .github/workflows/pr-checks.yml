name: pr-checks

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend lint, test, and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: car-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: car-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run frontend unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: http://localhost:8001

  backend:
    name: Backend lint, test, and migrations
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: car_tuning_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: car-backend-ms
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/car_tuning_test
      JWT_SECRET_KEY: ci-test-secret-key-at-least-32-characters
      JWT_EXPIRE_MINUTES: 60
      SEGMENTATION_MS_URL: http://localhost:8000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: car-backend-ms/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt ruff

      - name: Lint
        run: ruff check .

      - name: Import check
        run: python -m compileall .

      - name: Apply migrations
        run: alembic upgrade head

      - name: Detect model/schema drift
        run: alembic check

      - name: Run backend unit tests
        run: pytest --tb=short -q

      - name: Downgrade and re-upgrade migrations
        run: |
          alembic downgrade base
          alembic upgrade head

  segmentation:
    name: Segmentation lint and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: car-segmentation-ms
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check .

      - name: Run segmentation unit tests
        run: pytest --tb=short -q

  terraform:
    name: Terraform validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform/envs/dev
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Format check
        run: terraform fmt -check -recursive

      - name: Init without backend
        run: terraform init -backend=false

      - name: Validate
        run: terraform validate

  docker-build:
    name: Docker build smoke
    runs-on: ubuntu-latest
    needs: [frontend, backend, segmentation]
    strategy:
      fail-fast: false
      matrix:
        service:
          - car-frontend
          - car-backend-ms
          - car-segmentation-ms
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service }}
          push: false
          build-args: |
            VITE_API_BASE_URL=http://localhost:8001
          cache-from: type=gha
          cache-to: type=gha,mode=max
