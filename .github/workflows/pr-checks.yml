name: PR Checks

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  backend:
    name: Backend — lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: car-backend-ms/requirements*.txt

      - name: Install dependencies
        working-directory: car-backend-ms
        run: pip install -r requirements.txt -r requirements-test.txt ruff pip-audit

      - name: Lint (ruff)
        run: ruff check car-backend-ms/

      - name: Audit dependencies
        working-directory: car-backend-ms
        run: pip-audit -r requirements.txt

      - name: Test
        working-directory: car-backend-ms
        run: pytest --tb=short -q

  segmentation:
    name: Segmentation — lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: car-segmentation-ms/requirements*.txt

      - name: Install dependencies
        working-directory: car-segmentation-ms
        run: |
          pip install pip-audit
          pip install -r requirements.txt -r requirements-test.txt \
            --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Lint (ruff)
        run: ruff check car-segmentation-ms/

      - name: Audit dependencies
        working-directory: car-segmentation-ms
        run: pip-audit --local

      - name: Test
        working-directory: car-segmentation-ms
        run: pytest --tb=short -q; code=$?; [ $code -eq 0 ] || [ $code -eq 5 ]

  frontend:
    name: Frontend — lint, build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: car-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: car-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      - name: Lint (ESLint)
        run: npm run lint

      - name: Type-check & build
        run: npm run build

      - name: Test (Vitest)
        run: npm test
