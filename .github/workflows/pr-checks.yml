name: PR Checks

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: "1.25.4"

      - name: Install Gitleaks
        run: go install github.com/gitleaks/gitleaks/v8@v8.30.0

      - name: Run Gitleaks
        run: gitleaks detect --source . --redact --verbose

  backend:
    name: Backend — lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: car-backend-ms/requirements*.txt

      - name: Install dependencies
        working-directory: car-backend-ms
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-test.txt ruff pip-audit

      - name: Lint (ruff)
        run: ruff check car-backend-ms/

      - name: Audit dependencies
        working-directory: car-backend-ms
        run: python -m pip_audit -r requirements.txt

      - name: Test
        working-directory: car-backend-ms
        run: pytest --tb=short -q

  segmentation:
    name: Segmentation — lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: car-segmentation-ms/requirements*.txt

      - name: Install dependencies
        working-directory: car-segmentation-ms
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit
          python -m pip install -r requirements.txt -r requirements-test.txt \
            --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Lint (ruff)
        run: ruff check car-segmentation-ms/

      - name: Audit dependencies
        working-directory: car-segmentation-ms
        run: python -m pip_audit -r requirements.txt

      - name: Test
        working-directory: car-segmentation-ms
        run: pytest --tb=short -q; code=$?; [ $code -eq 0 ] || [ $code -eq 5 ]

  frontend:
    name: Frontend — lint, build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: car-frontend
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: car-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      - name: Lint (ESLint)
        run: npm run lint

      - name: Type-check & build
        run: npm run build

      - name: Test (Vitest)
        run: npm test
