name: car-backend-ms

on:
  push:
    branches: [main]
    paths:
      - "car-backend-ms/**"
      - ".github/workflows/car-backend.yml"
      - "pyproject.toml"
  pull_request:
    branches: [main]
    paths:
      - "car-backend-ms/**"
      - ".github/workflows/car-backend.yml"
      - "pyproject.toml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/car-backend-ms

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: car-backend-ms
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: car-backend-ms/requirements.txt

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check .

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: car-backend-ms
    env:
      DATABASE_URL: sqlite:///./test.db
      JWT_SECRET_KEY: ci-test-secret-key-at-least-32-characters
      JWT_EXPIRE_MINUTES: 60
      SEGMENTATION_MS_URL: http://localhost:8000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: car-backend-ms/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Apply migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest --tb=short -q

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: car-backend-ms
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
