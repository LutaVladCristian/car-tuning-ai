name: sam-microservice
channels:
  - nvidia
  - pytorch
  - conda-forge
  - defaults

dependencies:
  - python=3.12
  - pip
  - pytorch=2.2.0
  - torchvision
  - torchaudio
  - numpy<2  # Downgrade to ensure compatibility with torch and compiled modules
  - pip:
      - -r requirements.txt
      - -r requirements-dev.txt
